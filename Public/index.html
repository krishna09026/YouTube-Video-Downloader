<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>VideoSave</title>
</head>
<body>
    <nav class="videosave">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">VideoSave</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavDropdown">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Features</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Pricing</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Dropdown link
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Youtube video Download</a></li>
            <li><a class="dropdown-item" href="#">Mp4 to Mp3 Converter</a></li>
            <li><a class="dropdown-item" href="#">Mp3 songs Download</a></li>

          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
    <div class="container">
        <h1>YouTube Video Downloader</h1>
        <input type="text" id="url" placeholder="Paste YouTube URL">
        <button onclick="getVideo()">Get Video</button>
        <div id="result"></div>
    </div>
    <script>
        async function getVideo() {
            const url= document.getElementById("url").value;

            const res = await fetch("/video-info",{
                method: "POST",
                headers: {"content-type": "application/json"},
                body: JSON.stringify({ url })
            });

            const data = await res.json();

            const result= document.getElementById("result");
            result.innerHTML= "";

            if(data.error){
                result.innerHTML=`<p>${data.error}</p>`;
                return;
            }

            result.innerHTML=`
            <h3>${data.title}</h3>
            <img src="${data.thumbnail}" width="300"><br><br>
            `;

            data.formats.forEach(f => {
                const a = document.createElement("a");
                a.href = f.url;
                a.innerText = `document ${f.quality}`;
                a.target = "_blank";
                a.style.display = "block";
                result.appendChild(a);
            });
        }
    </script>
</body>
</html>
